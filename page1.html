  <p style="font-size:30px;"><bra>

    إلى حياة بائسة عند عائلة تيناردييه الجشعة، بعد موت أمها،

    عاش فيها والد الفتاة، لكنه يخفي وجهًا أكثر بشاعة من العائلة المنافقة.</bra></p>
